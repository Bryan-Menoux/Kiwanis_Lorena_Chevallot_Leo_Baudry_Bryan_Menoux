name: Build and Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: |
          npm run build
          cp package.json dist/
          cp .env.example dist/.env || echo "No .env.example found, creating empty .env"
          echo "POCKETBASE_URL=${{ secrets.POCKETBASE_URL }}" >> dist/.env
          echo "POCKETBASE_ADMIN_EMAIL=${{ secrets.POCKETBASE_ADMIN_EMAIL }}" >> dist/.env
          echo "POCKETBASE_ADMIN_PASSWORD=${{ secrets.POCKETBASE_ADMIN_PASSWORD }}" >> dist/.env
      - name: Clean remote directory before deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            if [ -d /var/www/kiwanis ] && [ "$(ls -A /var/www/kiwanis)" ]; then
              sudo rm -rf /var/www/kiwanis/
            fi

      - name: Deploy to VPS via SCP
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/"
          target: "/var/www/kiwanis/"
          rm: false
          overwrite: true
          debug: true

      - name: Install production dependencies on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/kiwanis
            npm install --production
            ls -la
            echo "Using .env from /var/www/pocketbase-kiwanis/.env"
            ls -la /var/www/pocketbase-kiwanis/.env
            PORT=8085 HOST=127.0.0.1 pm2 restart kiwanis || PORT=8085 HOST=127.0.0.1 pm2 start server/entry.mjs --name kiwanis --env-file /var/www/pocketbase-kiwanis/.env
