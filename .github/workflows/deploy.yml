name: Build and Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: |
          npm run build
          cp package.json dist/
          cp package-lock.json dist/

      - name: Clean remote directory before deploy (keep only .env)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/kiwanis

            echo "=== Before cleanup ==="
            ls -la

            echo "=== Cleaning everything except .env ==="
            find . -mindepth 1 -maxdepth 1 ! -name '.env' -exec rm -rf {} +

            echo "=== After cleanup ==="
            ls -la

      - name: Deploy dist folder into /var/www/kiwanis/dist
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist"
          target: "/var/www/kiwanis"
          rm: false
          overwrite: true

      - name: Install production dependencies and restart PM2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/kiwanis

            echo "=== Folder content ==="
            ls -la

            echo "=== dist content ==="
            ls -la dist || true

            echo "=== Installing dependencies in dist ==="
            cd dist
            npm ci --omit=dev

            echo "=== Starting application with PM2 (entry in dist/server) ==="
            export PORT=8085
            export HOST=0.0.0.0
            export NODE_OPTIONS="--dns-result-order=ipv4first"

            cd /var/www/kiwanis
            set -a && source .env && set +a

            pm2 restart kiwanis || pm2 start /var/www/kiwanis/dist/server/entry.mjs --name kiwanis --node-args="--dns-result-order=ipv4first"
            pm2 save
