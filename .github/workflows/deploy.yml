name: Build and Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: |
          npm run build
          cp package.json dist/
          cp package-lock.json dist/
      - name: Clean remote directory before deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/kiwanis
            # Supprimer tout sauf .env
            find . -maxdepth 1 -type f -not -name '.env' -delete
            find . -maxdepth 1 -type d -not -name '.' -exec rm -rf {} + 2>/dev/null || true

      - name: Deploy entire dist directory
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/**"
          target: "/var/www/kiwanis"
          rm: false
          overwrite: true
          debug: true

      - name: Install production dependencies on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/kiwanis
            ls -la
            echo "=== Installing dependencies ==="
            npm install --production
            echo "=== Files after npm install ==="
            ls -la server/ 2>/dev/null || echo "server/ directory missing"
            echo "=== Starting application ==="
            export PORT=8085 HOST=127.0.0.1
            pm2 restart kiwanis || pm2 start server/entry.mjs --name kiwanis --env-file .env
