name: Deploy Kiwanis

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: github
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /var/www/kiwanis

            echo "=== Pull latest code ==="
            git pull origin main

            echo "=== Run deploy script ==="
            chmod +x deploy-kiwanis.sh
            ./deploy-kiwanis.sh