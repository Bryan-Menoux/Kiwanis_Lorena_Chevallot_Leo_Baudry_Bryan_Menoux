name: Build and Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: |
          npm run build
          cp package.json dist/
          cp package-lock.json dist/
      - name: Clean remote directory before deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/kiwanis
            # Supprimer tout sauf .env
            rm -rf server client dist dist-temp
            rm -f package.json package-lock.json
            ls -la

      - name: Deploy dist directory
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/var/www/kiwanis"
          rm: false
          overwrite: true

      - name: Install production dependencies on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/kiwanis
            # Déplacer les fichiers de dist/ vers le parent
            if [ -d "dist" ]; then
              mv dist/* .
              rm -rf dist
            fi
            ls -la
            echo "=== Installing dependencies ==="
            npm install
            echo "=== Files after npm install ==="
            ls -la server/ 2>/dev/null || echo "server/ directory missing"
            echo "=== Starting application ==="
            export PORT=8085 HOST=0.0.0.0 NODE_OPTIONS="--dns-result-order=ipv4first"
            set -a && source .env && set +a
            pm2 restart kiwanis || pm2 start server/entry.mjs --name kiwanis --node-args="--dns-result-order=ipv4first"
