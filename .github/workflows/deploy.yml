name: Build and Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: |
          npm run build
          cp package.json dist/
          cp package-lock.json dist/
          test -f dist/server/entry.mjs

      - name: Clean remote directory before deploy (keep only .env)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/kiwanis
            find . -mindepth 1 -maxdepth 1 ! -name '.env' -exec rm -rf {} +
            ls -la

      - name: Upload dist to VPS
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/**"
          target: "/var/www/kiwanis"
          rm: false
          overwrite: true

      - name: Install deps in dist and restart PM2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /var/www/kiwanis
            ls -la
            ls -la dist
            test -f dist/server/entry.mjs

            cd /var/www/kiwanis/dist
            npm ci --omit=dev

            cd /var/www/kiwanis

            pm2 delete kiwanis || true
            pm2 start ecosystem.config.cjs --update-env
            pm2 save

            ss -ltnp | grep 8085 || true
            curl -I http://127.0.0.1:8085/ || true
