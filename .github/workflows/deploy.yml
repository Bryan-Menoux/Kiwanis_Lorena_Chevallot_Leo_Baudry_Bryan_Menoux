name: Build and Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: |
          npm run build
          cp package.json dist/
          cp package-lock.json dist/
      - name: Clean remote directory before deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Nettoyer les répertoires sans les supprimer complètement
            if [ -d /var/www/kiwanis/server ]; then
              rm -rf /var/www/kiwanis/server/*
            else
              mkdir -p /var/www/kiwanis/server
            fi
            if [ -d /var/www/kiwanis/client ]; then
              rm -rf /var/www/kiwanis/client/*
            else
              mkdir -p /var/www/kiwanis/client
            fi
            rm -f /var/www/kiwanis/package.json
            rm -f /var/www/kiwanis/package-lock.json

      - name: Deploy to VPS via SCP
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/server/"
          target: "/var/www/kiwanis/server/"
          rm: false
          overwrite: true
          debug: true

      - name: Deploy client files
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/client/"
          target: "/var/www/kiwanis/client/"
          rm: false
          overwrite: true

      - name: Deploy package.json
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/package.json"
          target: "/var/www/kiwanis/"
          rm: false
          overwrite: true

      - name: Deploy package-lock.json
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/package-lock.json"
          target: "/var/www/kiwanis/"
          rm: false
          overwrite: true

      - name: Install production dependencies on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/kiwanis
            npm install --production
            ls -la
            PORT=8085 HOST=127.0.0.1 pm2 restart kiwanis || PORT=8085 HOST=127.0.0.1 pm2 start server/entry.mjs --name kiwanis
